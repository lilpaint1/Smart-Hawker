{% extends "base.html" %}
{% block title %}แชท{% endblock %}
{% block body %}
<div class="topbar"><button class="back" onclick="go('/chat')"><i data-lucide="chevron-left"></i></button><h1 id="other">แชท</h1></div>
<main class="col" style="height:calc(100dvh - 56px)">
  <div id="msgs" class="flex1 col gap2" style="overflow-y:auto;padding:1rem"></div>
  <div class="row gap2" style="padding:.75rem;background:rgba(243,245,251,.95);backdrop-filter:blur(8px)">
    <input id="text" class="input flex1" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')send()">
    <button class="btn btn-primary" style="padding:.7rem .9rem;min-height:0" onclick="send()"><i data-lucide="send" style="width:18px"></i></button>
  </div>
</main>
{% endblock %}
{% block script %}<script>
const OTHER="{{ other_id }}";
const MYID = ME ? ME.id : null;
const threadId = [MYID, OTHER].sort().join("__");

API.get("/users/"+OTHER).then(d=>{ if(d.ok) $("#other").textContent=d.user.shopName||d.user.name; icons(); });

async function load(){
  const d=await API.get("/messages?threadId="+threadId);
  const box=$("#msgs");
  box.innerHTML = (d.messages||[]).map(m=>
    '<div class="bubble '+(m.mine?"me":"them")+'">'+esc(m.body)+'</div>').join("")
    || '<div class="muted center-text small" style="padding:2rem">เริ่มบทสนทนา</div>';
  box.scrollTop = box.scrollHeight;
}
async function send(){
  const t=$("#text").value.trim(); if(!t) return;
  $("#text").value="";
  await API.post("/messages",{toUserId:OTHER,body:t});
  load();
}
load();
setInterval(load, 3000);
</script>{% endblock %}
